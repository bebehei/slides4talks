            - Kapazit&auml;ten zwischen 1-800Gbit/s
            - Bezahlt wird immer
              - Portanschluss
              - Cross Connect
              - Benutzte Bandbreite nach 95%ile
            - Commit: 10% &uuml;blich
            - 5 bis 15 Mbit/s pro 1TB

            Slidenotes:
            - Telekom, "Downfall des deutschen Internets"
            </textarea>
          </section>

          <section data-markdown data-separator-notes="^Slidenotes:">
            <textarea data-template>
            ## Schicht II: Traffic-Preise

            - Lockangebot: &lt; 10ct/Mbit/s
              - ausreichend f&uuml; Cloud und Global
              - schlechte Telekom-Anbindung
            - &lt; 80-90ct/Mbit/s:
              - Originalpreis Telekom
            - Sinnvoll: Irgendwas dazwischen

            Slidenotes:
            - Telekom, "Downfall des deutschen Internets"
            </textarea>
          </section>

            5Mbit/s/TB * 0,50&euro;/Mbit/s = 2,50&euro;/TB

            - AWS Cloudfront 1PB: $40/TB
            - Google Cloud CDN 1PB: $35/TB
            </textarea>
